name: Sync zwknows deployment repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sync-zwknows-main
  cancel-in-progress: true

jobs:
  sync:
    if: github.repository == 'ruijayfeng/ziwei'
    runs-on: ubuntu-latest

    steps:
      - name: Check out source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main to zwknows
        env:
          ZWKNOWS_SYNC_TOKEN: ${{ secrets.ZWKNOWS_SYNC_TOKEN }}
        run: |
          if [ -z "$ZWKNOWS_SYNC_TOKEN" ]; then
            echo "ZWKNOWS_SYNC_TOKEN is not configured."
            exit 1
          fi

          git remote add zwknows-sync "https://x-access-token:${ZWKNOWS_SYNC_TOKEN}@github.com/ruijayfeng/zwknows.git"
          git fetch zwknows-sync main
          EXPECTED_ZWKNOWS_HEAD="$(git rev-parse FETCH_HEAD)"
          git push --force-with-lease=refs/heads/main:${EXPECTED_ZWKNOWS_HEAD} zwknows-sync HEAD:main
